<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FairCart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fc-bg-glow fc-glow-1"></div>
    <div class="fc-bg-glow fc-glow-2"></div>
    <div class="fc-bg-glow fc-glow-3"></div>
    <div class="fc-grain"></div>

    <nav class="navbar">
        <div class="logo">FairCart</div>
        <div class="nav-links">
            <a href="index.html">Back to Home</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <form id="login-form" onsubmit="login(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary btn-block">Login</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register</a></p>
                <p style="font-size: 0.8rem; margin-top: 1.5rem; color: #666;">
                    *Demo tips: Type 'customer@' or 'seller@' in your email to test respective roles instantly!
                </p>
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
