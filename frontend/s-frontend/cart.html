<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - FairCart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-wrapper {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 5%;
            position: relative;
            z-index: 10;
        }
        .cart-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--fc-border);
            padding-bottom: 1rem;
        }
        .cart-header h1 {
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--fc-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .cart-summary {
            margin-top: 3rem;
            background: var(--fc-surface);
            border: 1px solid var(--fc-border);
            padding: 2rem;
            border-radius: var(--fc-radius);
            text-align: right;
            backdrop-filter: blur(20px);
            box-shadow: var(--fc-shadow);
            position: relative;
            overflow: hidden;
        }
        .cart-summary::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--fc-gradient);
        }
        .cart-summary h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            font-weight: 800;
        }
        .checkout-btn {
            background: var(--fc-gradient);
            color: white;
            border: none;
            padding: 1rem 3rem;
            border-radius: 60px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--fc-transition);
            font-family: inherit;
            box-shadow: 0 8px 24px rgba(108, 99, 255, 0.25);
        }
        .checkout-btn:hover {
            box-shadow: 0 12px 32px rgba(108, 99, 255, 0.35);
            transform: translateY(-3px) scale(1.02);
        }
        @media(max-width: 768px) {
            .cart-item-card {
                grid-template-columns: 1fr !important;
                gap: 1.5rem;
                text-align: center;
            }
            .cart-item-card .item-total {
                margin-right: 0 !important;
                text-align: center !important;
            }
        }
    </style>
</head>
<body>
    <div class="fc-bg-glow fc-glow-1"></div>
    <div class="fc-bg-glow fc-glow-2"></div>
    <div class="fc-bg-glow fc-glow-3"></div>
    <div class="fc-grain"></div>

    <nav class="navbar">
        <div class="logo"><a href="index.html" style="color:inherit; text-decoration:none;">FairCart</a></div>
        <div class="nav-links" id="nav-links" data-auth-nav="true">
            <!-- Auth links generated by auth.js -->
        </div>
    </nav>

    <div class="cart-wrapper">
        <div class="cart-header">
            <h1>Shopping Cart</h1>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Review your selected items</p>
        </div>

        <!-- Render Items -->
        <div id="cart-items-container">
            <!-- Javascript injects cart elements here -->
        </div>

        <!-- Cart Summary block -->
        <div class="cart-summary">
            <h2 style="color: var(--text-secondary);">Total: <span id="cart-total" style="color: #1e1b4b;">₹0</span></h2>
            <button class="checkout-btn" onclick="checkoutCart()">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Execution scripts -->
    <script src="auth.js"></script>
    <script src="customer.js"></script>
    <script src="cart.js"></script>
</body>
</html>
