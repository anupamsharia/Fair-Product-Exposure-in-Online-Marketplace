<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (!new URLSearchParams(window.location.search).has("assistant")) {
            window.location.replace("seller.html");
        }
    </script>
    <title>Become a Seller – FairCart Smart Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Smart Seller Assistant ───────────────────────────────── */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: #07080f;
            font-family: 'Inter', sans-serif;
            color: #e8eaf6;
            display: flex;
            flex-direction: column;
        }

        .ssa-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 16px 40px;
            gap: 24px;
        }

        /* Header badge */
        .ssa-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(139, 92, 246, 0.12);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #a78bfa;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .ssa-badge .pulse-dot {
            width: 8px; height: 8px;
            background: #a78bfa;
            border-radius: 50%;
            animation: pulse-ring 1.8s infinite;
        }
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(167,139,250,0.6); }
            70%  { box-shadow: 0 0 0 8px rgba(167,139,250,0); }
            100% { box-shadow: 0 0 0 0 rgba(167,139,250,0); }
        }

        /* Chat window */
        .ssa-window {
            width: 100%;
            max-width: 580px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(139,92,246,0.08);
        }

        /* Window header bar */
        .ssa-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px 24px;
            background: rgba(139, 92, 246, 0.08);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .ssa-avatar {
            width: 44px; height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(124,58,237,0.4);
        }
        .ssa-header-info { flex: 1; }
        .ssa-name { font-weight: 700; font-size: 0.95rem; color: #e8eaf6; }
        .ssa-status {
            font-size: 0.75rem; color: #6ee7b7;
            display: flex; align-items: center; gap: 5px; margin-top: 2px;
        }
        .ssa-status::before {
            content: '';
            width: 6px; height: 6px;
            background: #6ee7b7;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-ring 1.8s infinite;
        }
        .ssa-step-indicator {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            font-weight: 500;
        }

        /* Messages area */
        .ssa-messages {
            padding: 24px;
            min-height: 300px;
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .ssa-messages::-webkit-scrollbar { width: 4px; }
        .ssa-messages::-webkit-scrollbar-track { background: transparent; }
        .ssa-messages::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 4px; }

        /* Message bubbles */
        .msg {
            display: flex;
            gap: 10px;
            animation: msg-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(12px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .msg.bot { align-items: flex-start; }
        .msg.user { align-items: flex-start; flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; flex-shrink: 0; margin-top: 2px;
        }
        .msg.bot .msg-avatar { background: linear-gradient(135deg, #7c3aed, #4f46e5); }
        .msg.user .msg-avatar { background: rgba(255,255,255,0.08); }

        .msg-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.55;
            font-weight: 400;
        }
        .msg.bot .msg-bubble {
            background: rgba(139, 92, 246, 0.12);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-top-left-radius: 4px;
            color: #e8eaf6;
        }
        .msg.user .msg-bubble {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-top-right-radius: 4px;
            color: #fff;
            font-weight: 500;
        }

        /* Typing indicator */
        .typing-bubble {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: 18px;
            border-top-left-radius: 4px;
            padding: 14px 18px;
            display: flex; gap: 5px; align-items: center;
        }
        .typing-dot {
            width: 7px; height: 7px;
            background: #a78bfa;
            border-radius: 50%;
            animation: typing-bounce 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing-bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30%            { transform: translateY(-5px); opacity: 1; }
        }

        /* Input area */
        .ssa-input-area {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(0,0,0,0.15);
        }
        .ssa-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .ssa-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 13px 18px;
            color: #e8eaf6;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .ssa-input::placeholder { color: rgba(255,255,255,0.25); }
        .ssa-input:focus {
            border-color: rgba(139,92,246,0.5);
            box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
        }
        .ssa-input:disabled { opacity: 0.5; cursor: not-allowed; }

        .ssa-send-btn {
            width: 46px; height: 46px;
            border-radius: 13px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.1rem;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            box-shadow: 0 4px 15px rgba(124,58,237,0.35);
            flex-shrink: 0;
        }
        .ssa-send-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 6px 20px rgba(124,58,237,0.5); }
        .ssa-send-btn:active:not(:disabled) { transform: scale(0.97); }
        .ssa-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Option chips */
        .ssa-chips {
            display: flex; flex-wrap: wrap; gap: 8px;
            padding: 0 20px 16px;
        }
        .chip {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            padding: 7px 16px;
            color: #c4b5fd;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            animation: msg-in 0.3s both;
        }
        .chip:hover { background: rgba(139,92,246,0.25); border-color: #a78bfa; color: #fff; }

        /* Success state */
        .ssa-success {
            text-align: center;
            padding: 40px 24px;
            animation: msg-in 0.5s both;
        }
        .success-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            animation: pop-in 0.5s cubic-bezier(0.175,0.885,0.32,1.275) 0.2s both;
        }
        @keyframes pop-in {
            from { transform: scale(0.3); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        .success-title { font-size: 1.4rem; font-weight: 800; color: #6ee7b7; margin-bottom: 8px; }
        .success-sub { font-size: 0.9rem; color: rgba(255,255,255,0.5); line-height: 1.6; }
        .success-btn {
            display: inline-block;
            margin-top: 24px;
            padding: 13px 32px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff; border-radius: 14px;
            font-weight: 600; font-size: 0.9rem;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(124,58,237,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .success-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.5); }

        /* Error message */
        .ssa-error-msg {
            color: #fca5a5;
            font-size: 0.8rem;
            padding: 6px 20px 12px;
            animation: msg-in 0.3s both;
        }

        /* Progress bar */
        .ssa-progress {
            height: 3px;
            background: rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }
        .ssa-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #818cf8);
            transition: width 0.5s ease;
            border-radius: 0 3px 3px 0;
        }
    </style>
</head>
<body>
    <div class="fc-bg-glow fc-glow-1"></div>
    <div class="fc-bg-glow fc-glow-2"></div>
    <div class="fc-bg-glow fc-glow-3"></div>
    <div class="fc-grain"></div>

    <nav class="navbar">
        <a href="index.html" class="logo" style="text-decoration:none;">FairCart</a>
        <div class="nav-links">
            <a href="seller.html">← Back</a>
        </div>
    </nav>

    <div class="ssa-page">
        <div class="ssa-badge">
            <div class="pulse-dot"></div>
            Smart Seller Assistant
        </div>

        <div class="ssa-window">
            <!-- progress bar -->
            <div class="ssa-progress">
                <div class="ssa-progress-bar" id="progress-bar" style="width: 0%"></div>
            </div>

            <!-- header -->
            <div class="ssa-header">
                <div class="ssa-avatar">🤖</div>
                <div class="ssa-header-info">
                    <div class="ssa-name">Aria — FairCart AI</div>
                    <div class="ssa-status">Online & ready to help</div>
                </div>
                <div class="ssa-step-indicator" id="step-counter">Step 1 of 4</div>
            </div>

            <!-- messages -->
            <div class="ssa-messages" id="chat-messages"></div>

            <!-- option chips (shown contextually) -->
            <div class="ssa-chips" id="chip-area" style="display:none;"></div>
            <div class="ssa-error-msg" id="error-msg" style="display:none;"></div>

            <!-- input -->
            <div class="ssa-input-area" id="input-area">
                <div class="ssa-input-row">
                    <input class="ssa-input" id="ssa-input" type="text" placeholder="Type your answer…" autocomplete="off">
                    <button class="ssa-send-btn" id="ssa-send" onclick="handleSend()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
    const SELLER_REGISTER_API_ORIGIN = typeof getFairCartApiOrigin === "function"
        ? getFairCartApiOrigin()
        : (window.location.port === "5000" ? "" : `${window.location.protocol === "https:" ? "https:" : "http:"}//${window.location.hostname || "localhost"}:5000`);
    const SELLER_REGISTER_ADMIN_URL = typeof getFairCartBackendUrl === "function"
        ? getFairCartBackendUrl('/admin')
        : `${SELLER_REGISTER_API_ORIGIN || window.location.origin}/admin`;

    const sellerRegisterUser = getCurrentUser();
    if (sellerRegisterUser?.role === 'customer') window.location.href = 'index.html';
    if (sellerRegisterUser?.role === 'seller') window.location.href = 'seller-dashboard.html';
    if (sellerRegisterUser?.role === 'admin') window.location.href = SELLER_REGISTER_ADMIN_URL;

    // ── State ───────────────────────────────────────────────────────
    const STEPS = [
        {
            key: 'name',
            type: 'text',
            question: "👋 Hey there! I'm <b>Aria</b>, your personal onboarding assistant.<br><br>Let's get you set up as a seller on FairCart. First up — what's your <b>full name</b>?",
            placeholder: "e.g. Rahul Sharma",
            validate: v => v.trim().length >= 2 ? null : "Please enter your full name (at least 2 characters)."
        },
        {
            key: 'email',
            type: 'email',
            question: "Great to meet you, <b>{name}</b>! 🎉<br><br>What's your <b>email address</b>? This will be your login.",
            placeholder: "e.g. rahul@example.com",
            validate: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()) ? null : "That doesn't look like a valid email. Try again?"
        },
        {
            key: 'password',
            type: 'password',
            question: "Perfect! Now create a <b>secure password</b> for your account. 🔐<br><small style='opacity:0.5;'>Minimum 6 characters.</small>",
            placeholder: "At least 6 characters…",
            validate: v => v.length >= 6 ? null : "Password must be at least 6 characters long."
        },
        {
            key: 'shop_name',
            type: 'text',
            question: "Almost there! What would you like to <b>name your store</b>? 🏪",
            placeholder: "e.g. Rahul Supermart",
            validate: v => v.trim().length >= 2 ? null : "Store name must be at least 2 characters."
        }
    ];

    const answers = {};
    let currentStep = 0;
    let isTyping = false;

    // ── Refs ────────────────────────────────────────────────────────
    const chatEl   = document.getElementById('chat-messages');
    const inputEl  = document.getElementById('ssa-input');
    const sendBtn  = document.getElementById('ssa-send');
    const errorEl  = document.getElementById('error-msg');
    const stepEl   = document.getElementById('step-counter');
    const progBar  = document.getElementById('progress-bar');
    const chipArea = document.getElementById('chip-area');
    const inputArea= document.getElementById('input-area');

    // ── Helpers ─────────────────────────────────────────────────────
    function addMsg(text, type = 'bot', delay = 0) {
        return new Promise(resolve => {
            setTimeout(() => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${type}`;
                const avatar = type === 'bot' ? '🤖' : '👤';
                msgDiv.innerHTML = `
                    <div class="msg-avatar">${avatar}</div>
                    <div class="msg-bubble">${text}</div>
                `;
                chatEl.appendChild(msgDiv);
                chatEl.scrollTop = chatEl.scrollHeight;
                resolve();
            }, delay);
        });
    }

    function showTyping(duration = 1200) {
        return new Promise(resolve => {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'msg bot';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="msg-avatar">🤖</div>
                <div class="typing-bubble">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatEl.appendChild(typingDiv);
            chatEl.scrollTop = chatEl.scrollHeight;
            setTimeout(() => {
                const el = document.getElementById('typing-indicator');
                if (el) el.remove();
                resolve();
            }, duration);
        });
    }

    function setInput(enabled, type = 'text', placeholder = '') {
        inputEl.disabled = !enabled;
        sendBtn.disabled = !enabled;
        if (type === 'password') {
            inputEl.type = 'password';
        } else {
            inputEl.type = 'text';
        }
        if (placeholder) inputEl.placeholder = placeholder;
        if (enabled) setTimeout(() => inputEl.focus(), 50);
    }

    function updateProgress() {
        const pct = Math.round((currentStep / STEPS.length) * 100);
        progBar.style.width = pct + '%';
        if (currentStep < STEPS.length) {
            stepEl.textContent = `Step ${currentStep + 1} of ${STEPS.length}`;
        } else {
            stepEl.textContent = 'Complete!';
        }
    }

    function interpolate(str) {
        return str.replace(/{(\w+)}/g, (_, k) => answers[k] || '');
    }

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
        inputEl.style.borderColor = 'rgba(252,165,165,0.4)';
        setTimeout(() => {
            errorEl.style.display = 'none';
            inputEl.style.borderColor = '';
        }, 3000);
    }

    // ── Flow ────────────────────────────────────────────────────────
    async function askStep(stepIndex) {
        const step = STEPS[stepIndex];
        updateProgress();
        setInput(false);
        chipArea.style.display = 'none';

        await showTyping(900);
        await addMsg(interpolate(step.question));

        setInput(true, step.type, step.placeholder);
        inputEl.value = '';
    }

    async function handleSend() {
        if (isTyping || inputEl.disabled) return;
        const val = inputEl.value.trim() || inputEl.value; // allow password spaces
        const rawVal = inputEl.value;

        const step = STEPS[currentStep];
        const error = step.validate(rawVal);

        if (error) { showError(error); return; }

        // Record answer
        answers[step.key] = rawVal.trim ? rawVal.trim() : rawVal;

        // Show user message (mask password)
        const display = step.type === 'password' ? '••••••••' : rawVal;
        inputEl.value = '';
        setInput(false);
        isTyping = true;
        await addMsg(display, 'user');

        currentStep++;

        if (currentStep < STEPS.length) {
            await askStep(currentStep);
        } else {
            await finalize();
        }
        isTyping = false;
    }

    async function finalize() {
        updateProgress();
        setInput(false);

        await showTyping(800);
        await addMsg(`Awesome, <b>${answers.name}</b>! Let me confirm your details:<br><br>
            📧 <b>Email:</b> ${answers.email}<br>
            🏪 <b>Store:</b> ${answers.shop_name}<br><br>
            Creating your account now… ✨`);

        await showTyping(1400);

        try {
            const payload = {
                name: answers.name,
                email: answers.email,
                password: answers.password,
                role: 'seller',
                shop_name: answers.shop_name,
                aadhaar_number: "NOT_PROVIDED_REG"
            };
            const res = await fetch(`${SELLER_REGISTER_API_ORIGIN}/api/auth/register`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (res.ok) {
                showSuccess();
            } else {
                await addMsg(`❌ <b>Hmm, something went wrong:</b> ${data.message || 'Please try again.'}`);
                // Restart from step 0 if email taken
                await showTyping(600);
                await addMsg("Let's try again from the beginning 👇");
                currentStep = 0;
                Object.keys(answers).forEach(k => delete answers[k]);
                await askStep(0);
            }
        } catch (err) {
            await addMsg("⚠️ Couldn't reach the server. Please make sure the backend is running on port 5000.");
        }
    }

    function showSuccess() {
        chatEl.innerHTML = `
            <div class="ssa-success">
                <div class="success-icon">🎉</div>
                <div class="success-title">You're in, ${answers.name}!</div>
                <div class="success-sub"><b>${answers.shop_name}</b> is now registered on FairCart.<br>Log in to your seller dashboard and start listing products.</div>
                <a href="login.html" class="success-btn">Go to Login →</a>
            </div>
        `;
        document.getElementById('input-area').style.display = 'none';
        chipArea.style.display = 'none';
        progBar.style.width = '100%';
        stepEl.textContent = '✅ Done';
    }

    // ── Enter key ───────────────────────────────────────────────────
    inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleSend();
    });

    // ── Boot ─────────────────────────────────────────────────────────
    (async () => {
        setInput(false);
        await new Promise(r => setTimeout(r, 400));
        await askStep(0);
    })();
    </script>
</body>
</html>
