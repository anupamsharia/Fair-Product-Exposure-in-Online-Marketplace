<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FairCart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fc-bg-glow fc-glow-1"></div>
    <div class="fc-bg-glow fc-glow-2"></div>
    <div class="fc-bg-glow fc-glow-3"></div>
    <div class="fc-grain"></div>

    <nav class="navbar">
        <div class="logo">FairCart</div>
        <div class="nav-links">
            <a href="index.html">Back to Home</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <form id="register-form" onsubmit="register(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label>Account Role</label>
                    <select id="role" class="form-control" required style="background: rgba(255,255,255,0.8);" onchange="toggleSellerFields()">
                        <option value="customer">Customer</option>
                        <option value="seller">Seller</option>
                    </select>
                </div>

                <div id="seller-fields" style="display: none; background: rgba(108,99,255,0.04); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;">
                    <h4 style="margin-bottom: 1rem; color: var(--primary-color);">Seller Details</h4>
                    <div class="form-group">
                        <label>Shop Name</label>
                        <input type="text" id="shop-name" class="form-control" placeholder="e.g. Rahul Supermart">
                    </div>
                    <div class="form-group">
                        <label>Aadhaar Number</label>
                        <input type="text" id="aadhaar-number" class="form-control" placeholder="XXXX XXXX XXXX">
                    </div>
                    <div class="form-group">
                        <label>Upload ID Proof</label>
                        <input type="file" id="id-proof" class="form-control" style="padding: 0.5rem;" accept="image/*,.pdf">
                    </div>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Register</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        function toggleSellerFields() {
            const role = document.getElementById('role').value;
            const sellerFields = document.getElementById('seller-fields');
            const shopName = document.getElementById('shop-name');
            const aadhaar = document.getElementById('aadhaar-number');
            
            if (role === 'seller') {
                sellerFields.style.display = 'block';
                shopName.required = true;
                aadhaar.required = true;
            } else {
                sellerFields.style.display = 'none';
                shopName.required = false;
                aadhaar.required = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role');
            if (role === 'seller') {
                document.getElementById('role').value = 'seller';
                toggleSellerFields();
            }
        });
    </script>
    <script src="auth.js"></script>
</body>
</html>
